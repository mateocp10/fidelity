name: fidelity_app
description: "App de fidelización con Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.6.1
  mobile_scanner: ^5.0.0
  flutter_map: ^6.1.2
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  geocoding: ^2.2.0
  validators: ^3.0.0
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.8
  uuid: ^4.5.2
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.2
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2
  csv: ^6.0.0
  universal_html: ^2.2.4
  fl_chart: ^0.69.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  confetti: ^0.8.0
  gal: ^2.3.2
  flutter_image_compress: ^2.2.0
  flutter_local_notifications: ^17.1.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_blanco.png"
  min_sdk_size: 21
  web:
    generate: true
    image_path: "assets/images/logo_blanco.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
